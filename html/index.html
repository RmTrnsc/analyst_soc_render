			text.innerHTML = "[*] Accessing encrypted memory area...<br>";
			setTimeout(() => {
				text.innerHTML += "[*] Decrypting sequence...<br>";
				setTimeout(() => {
					text.innerHTML += "[+] SUCCESS: " + _0x5a21[0];
